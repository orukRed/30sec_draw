<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a3e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景の角丸四角 -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bgGrad)" />

  <!-- タイマー上部のボタン (ストップウォッチ風) -->
  <rect x="112" y="28" width="32" height="18" rx="6" ry="6" fill="#f8f8f2" opacity="0.9" />

  <!-- タイマー本体の円 (外枠) -->
  <circle cx="128" cy="148" r="88" fill="#f8f8f2" opacity="0.95" />

  <!-- タイマー文字盤 (内側) -->
  <circle cx="128" cy="148" r="78" fill="url(#faceGrad)" />

  <!-- 目盛り (12個) -->
  <g stroke="#f8f8f2" stroke-width="3" opacity="0.5">
    <line x1="128" y1="78" x2="128" y2="90" />
    <line x1="167" y1="83" x2="161" y2="94" />
    <line x1="193" y1="109" x2="182" y2="115" />
    <line x1="198" y1="148" x2="186" y2="148" />
    <line x1="193" y1="187" x2="182" y2="181" />
    <line x1="167" y1="213" x2="161" y2="202" />
    <line x1="128" y1="218" x2="128" y2="206" />
    <line x1="89" y1="213" x2="95" y2="202" />
    <line x1="63" y1="187" x2="74" y2="181" />
    <line x1="58" y1="148" x2="70" y2="148" />
    <line x1="63" y1="109" x2="74" y2="115" />
    <line x1="89" y1="83" x2="95" y2="94" />
  </g>

  <!-- 目盛り (上・右・下・左は太く) -->
  <g stroke="#f8f8f2" stroke-width="4" opacity="0.9">
    <line x1="128" y1="78" x2="128" y2="94" />
    <line x1="198" y1="148" x2="182" y2="148" />
    <line x1="128" y1="218" x2="128" y2="202" />
    <line x1="58" y1="148" x2="74" y2="148" />
  </g>

  <!-- 進捗アーク (30秒 = 時計の半分を示すオレンジ) -->
  <path d="M 128 78 A 70 70 0 1 1 128 218"
        fill="none" stroke="#f39c12" stroke-width="6" stroke-linecap="round" opacity="0.8" />

  <!-- 秒針 -->
  <line x1="128" y1="148" x2="128" y2="86" stroke="#e74c3c" stroke-width="3" stroke-linecap="round" />

  <!-- 分針 (短い) -->
  <line x1="128" y1="148" x2="170" y2="148" stroke="#f8f8f2" stroke-width="4" stroke-linecap="round" />

  <!-- 中心の円 -->
  <circle cx="128" cy="148" r="6" fill="#e74c3c" />
  <circle cx="128" cy="148" r="3" fill="#f8f8f2" />

  <!-- "30" テキスト -->
  <text x="128" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f39c12" opacity="0.9">30s</text>
</svg>
